<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAX Prototype 3</title>

<link rel="stylesheet" href="dax.css">

</head>


<body>


<div class="dax-container">

<h1>🤖 DAX Prototype 3</h1>

<p id="statut">
Système actif...
</p>


<div id="conversation">

<div class="message dax">
DAX : Bienvenue dans mes archives.<br>
Posez une question.
</div>

</div>



<div class="zone-question">

<input 
id="question" 
placeholder="Écrivez une question..."
autocomplete="off"
>


<button onclick="envoyerQuestion()">
Analyser
</button>


</div>


</div>



<script>


// =================================
// CONFIGURATION GEMINI
// =================================


const URL_DAX =
"https://dax-ia.tiros8158.workers.dev/";




// =================================
// ARCHIVES ARG DE DAX
// =================================


function analyserQuestion(question){


let q = question.toLowerCase();



// Conversation normale


if(
q.includes("bonjour") ||
q.includes("salut") ||
q.includes("hello")
){

return `
Connexion établie.<br><br>

Bonjour.<br>
Je suis DAX, système d'analyse du Maze Laboratory.<br>
Que souhaitez-vous rechercher ?
`;

}



if(
q.includes("ça va") ||
q.includes("sa va") ||
q.includes("comment vas-tu")
){

return `
Diagnostic terminé.<br><br>

Tous les systèmes fonctionnent normalement.<br>
DAX est opérationnel.
`;

}



if(q.includes("merci")){

return `
Confirmation reçue.<br><br>

DAX reste disponible.
`;

}




// =============================
// ARCHIVES SECRETES
// =============================



if(
q.includes("qui est tom") ||
q == "tom"
){

return `
Analyse du sujet...<br><br>

Sujet identifié : TOM<br><br>

Accès aux archives principales refusé.<br><br>

ERREUR : XxToMxX
`;

}



if(
q.includes("qui est dax") ||
q.includes("pourquoi dax a été créé") ||
q.includes("pourquoi dax existe")
){

return `
Recherche du projet DAX...<br><br>

Données protégées.<br>

Autorisation nécessaire.<br><br>

ERREUR : cronomonoserot_6-5
`;

}



if(q.includes("qui est emillien")){

return `
Analyse terminée.<br><br>

Archive Emillien verrouillée.<br><br>

ERREUR : croximillien_5-6
`;

}



if(q.includes("qui est nok")){

return `
Analyse terminée.<br><br>

Archive Nok verrouillée.<br><br>

ERREUR : epicxonder_5-6
`;

}



if(
q.includes("chaos") ||
q.includes("danger tom")
){

return `
Analyse du niveau de menace...<br><br>

Information classifiée.<br><br>

ERREUR : htrostb
`;

}



if(
q.includes("legion") ||
q.includes("arme de tom")
){

return `
Analyse de l'arsenal...<br><br>

Accès refusé.<br><br>

ERREUR : ast-tsa
`;

}
    // =============================
// SUITE DES ARCHIVES ARG
// =============================


if(
q.includes("dieux") ||
q.includes("fury")
){

return `
Connexion aux archives divines...<br><br>

Données inaccessibles.<br><br>

ERREUR : partypartyfolly
`;

}



if(
q.includes("laboratoire") ||
q.includes("labo détruit") ||
q.includes("destruction")
){

return `
Analyse des archives du laboratoire...<br><br>

Destruction confirmée.<br><br>

ERREUR : adieux.tom.labo
`;

}



if(
q.includes("création de tom") ||
q.includes("comment tom a été créé")
){

return `
Recherche de la recette expérimentale...<br><br>

Fichier verrouillé.<br><br>

ERREUR : 041P
`;

}



if(
q.includes("roi") ||
q.includes("king")
){

return `
Analyse royale...<br><br>

Ancienne archive détectée.<br><br>

ERREUR : ABST_1
`;

}


// Aucune archive trouvée

return null;


}




// =================================
// GEMINI
// =================================


async function demanderGemini(question){


try{


let resultat = await fetch(
URL_DAX,
{

method:"POST",

headers:{
"Content-Type":"application/json"
},


body:JSON.stringify({
question:question
})


});


let data = await resultat.json();


return data.answer ||
"Aucune réponse reçue.";

}


catch(e){


return "Erreur de connexion avec DAX IA : " + e.message;

}


}





// =================================
// ENVOI QUESTION
// =================================


async function envoyerQuestion(){


let champ =
document.getElementById("question");


let question =
champ.value.trim();



if(question === ""){
return;
}



ajouterMessage(
"Vous : " + question,
"joueur"
);



champ.value = "";



let reponse =
analyserQuestion(question);



// Si ce n'est pas une archive ARG
// alors on utilise Gemini


if(reponse === null){

ajouterMessage(
"DAX : Recherche externe...",
"dax"
);


reponse =
await demanderGemini(question);

}




ajouterMessage(
"DAX :<br>" + reponse,
"dax"
);



}





// =================================
// AFFICHAGE
// =================================


function ajouterMessage(texte,type){


let zone =
document.getElementById("conversation");



let message =
document.createElement("div");



message.className =
"message " + type;



message.innerHTML =
texte;



zone.appendChild(message);



zone.scrollTop =
zone.scrollHeight;


}


</script>


</body>

</html>
