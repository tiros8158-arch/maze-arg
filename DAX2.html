<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DAX Archive</title>

<link rel="stylesheet" href="dax.css">

</head>


<body>


<div class="dax-container">

<h1>🤖 DAX Prototype 3</h1>

<p id="statut">
Système actif...
</p>


<div id="conversation">

<div class="message dax">
DAX : Bienvenue dans mes archives.
<br>
Posez une question.
</div>

</div>



<div class="zone-question">

<input id="question" placeholder="Votre question...">

<button onclick="envoyerQuestion()">
Analyser
</button>


</div>


</div>


<script>

    // ============================
// ARCHIVES DAX - SYSTEME ARG
// ============================

function analyserQuestion(question){

let q = question.toLowerCase();


// TOM

if(q.includes("qui est tom") || q.includes("tom")){

return `
Analyse du sujet...

Sujet identifié : TOM

Accès aux archives principales refusé.

ERREUR : XxToMxX
`;
}



// DAX

if(
q.includes("pourquoi dax a été créé") ||
q.includes("pourquoi dax existe") ||
q.includes("qui est dax")
){

return `
Consultation du projet DAX...

Données protégées.

Autorisation nécessaire.

ERREUR : cronomonoserot_6-5
`;
}



// EMILLIEN

if(q.includes("qui est emillien")){

return `
Analyse...

Identité trouvée.

Données classifiées.

ERREUR : croximillien_5-6
`;
}



// NOK

if(q.includes("qui est nok")){

return `
Analyse...

Protection détectée.

Archive verrouillée.

ERREUR : epicxonder_5-6
`;
}



// CHAOS

if(
q.includes("pourquoi tom est dangereux") ||
q.includes("danger tom")
){

return `
Analyse du niveau de menace...

Information critique.

Accès refusé.

ERREUR : htrostb
`;
}



// LEGION

if(
q.includes("quelles armes possédait tom") ||
q.includes("arme de tom")
){

return `
Consultation de l'arsenal...

Données verrouillées.

ERREUR : ast-tsa
`;
}



// FURY

if(
q.includes("pourquoi les dieux ont peur") ||
q.includes("dieux")
){

return `
Connexion aux archives divines...

Données inaccessibles.

ERREUR : partypartyfolly
`;
}



// DESTRUCTION LABO

if(
q.includes("comment le laboratoire a été détruit") ||
q.includes("destruction du laboratoire") ||
q.includes("labo détruit")
){

return `
Analyse des archives...

Destruction confirmée.

Cause inconnue.

ERREUR : adieux.tom.labo
`;
}



// CREATION

if(
q.includes("comment tom a été créé") ||
q.includes("création de tom")
){

return `
Recherche de la recette...

Fichier expérimental trouvé.

Accès interdit.

ERREUR : 041P
`;
}



// KING

if(
q.includes("qui est le roi") ||
q.includes("king")
){

return `
Analyse royale...

Archive ancienne détectée.

ERREUR : ABST_1
`;
}



// QUESTION INCONNUE

return `
Analyse terminée...

Aucune archive correspondante.

Recherche impossible.
`;

}

    // ============================
// AFFICHAGE DES MESSAGES
// ============================


function envoyerQuestion(){

let champ = document.getElementById("question");

let question = champ.value.trim();


if(question === ""){
return;
}


ajouterMessage(
"Vous : " + question,
"joueur"
);



champ.value = "";



let reponse = analyserQuestion(question);



ajouterMessage(
"DAX :<br>" + reponse,
"dax"
);


}




function ajouterMessage(texte, type){

let zone =
document.getElementById("conversation");


let message =
document.createElement("div");


message.className =
"message " + type;


message.innerHTML =
texte;


zone.appendChild(message);



zone.scrollTop =
zone.scrollHeight;

}
</script>

</body>

</html>
